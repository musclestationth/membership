<!DOCTYPE html>
<html lang="th">  
<head>
  <meta charset="UTF-8">
  <title>Admin สมาชิกสถานีนักกล้าม</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#111; color:#fff; }
    .container { padding:20px; max-width:900px; margin:auto; }
    .card { background:#1c1c1c; border:1px solid #333; border-radius:16px; padding:16px; margin-bottom:14px; }
    input, select, button { padding:10px; border-radius:8px; border:none; margin:4px 0; }
    button { background:#e53935; color:#fff; font-weight:bold; cursor:pointer; }
    .green { background:#1b5e20; }
    .gray { background:#333; }
    .row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .small { color:#aaa; font-size:13px; }
  </style>
</head>

<body>
<div class="container">
  <h1>🏋️ Admin สมาชิกสถานีนักกล้าม</h1>
  <p class="small">จัดการสมาชิกจาก Firebase</p>

<div style="display:flex;gap:8px;margin-bottom:12px;">
  <input
    id="searchPhone"
    placeholder="ค้นหาจากเบอร์โทร เช่น 081"
    oninput="resetPageAndRender()"
    style="flex:1;box-sizing:border-box;"
  >

  <select
    id="searchPackage"
    onchange="resetPageAndRender()"
    style="width:140px;"
  >
    <option value="">ทุกแพ็กเกจ</option>
    <option value="รายวัน">รายวัน</option>
    <option value="รายเดือน">รายเดือน</option>
    <option value="ราย6เดือน">ราย6เดือน</option>
    <option value="รายปี">รายปี</option>
  </select>
</div>
  <div id="app">กำลังโหลดข้อมูล...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDI3i71Y6ojdsxN4a60Dli4zcCt2_fmJpc",
  authDomain: "musclestation-3e6ca.firebaseapp.com",
  projectId: "musclestation-3e6ca",
  storageBucket: "musclestation-3e6ca.firebasestorage.app",
  messagingSenderId: "840246501105",
  appId: "1:840246501105:web:8aff7eeb2f3d2186f9d350"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let members = [];
  let currentPage = 1;
const pageSize = 30;


window.saveMember = saveMember;
window.loadMembers = loadMembers;
  window.renderMembers = renderMembers;
  window.changePage = changePage;
  window.resetPageAndRender = resetPageAndRender;

async function loadMembers() {
  document.getElementById('app').innerHTML =
    '<div class="card">กำลังโหลดข้อมูล...</div>';

  try {
    const q = query(collection(db, "members"), orderBy("CreatedAt", "desc"));
const snap = await getDocs(q);

    members = [];
    snap.forEach(docSnap => {
      members.push({
        id: docSnap.id,
        ...docSnap.data()
      });
    });

    renderMembers();

  } catch (error) {
    console.error(error);
    document.getElementById('app').innerHTML = `
      <div class="card">
        โหลดข้อมูลไม่สำเร็จ<br>
        <span class="small">${error.message}</span>
      </div>
    `;
  }
}

function getStatusColor(status) {
  switch (status) {
    case 'Active':
      return '#2e7d32'; // เขียว

    case 'Pending':
      return '#f9a825'; // เหลือง

    case 'Expired':
      return '#c62828'; // แดง

    default:
      return '#555';
  }
}

  function formatCreatedAt(createdAt) {
  if (!createdAt) return '-';

  const date = createdAt.toDate ? createdAt.toDate() : new Date(createdAt);

  return date.toLocaleString('th-TH', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit'
  });
}
  

function renderMembers() {
    const keyword = document.getElementById('searchPhone')?.value.trim() || '';
  const packageFilter = document.getElementById('searchPackage')?.value || '';

  const filteredList = members.filter(m => {
    const phoneMatch = keyword
      ? String(m.Phone || '').includes(keyword)
      : true;

    const packageMatch = packageFilter
      ? m.Package === packageFilter
      : true;

    return phoneMatch && packageMatch;
  });

  const totalPages = Math.ceil(filteredList.length / pageSize);

  if (currentPage > totalPages && totalPages > 0) {
    currentPage = 1;
  }

  const start = (currentPage - 1) * pageSize;
  const list = filteredList.slice(start, start + pageSize);

  if (list.length === 0) {
    document.getElementById('app').innerHTML =
      '<div class="card">ไม่พบสมาชิก</div>';
    return;
  }

  document.getElementById('app').innerHTML = `
    <div class="card" style="padding:10px;background:#222;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-weight:bold;">
        <div style="flex:2;min-width:260px;">ข้อมูลสมาชิก</div>
        <div style="width:110px;">สถานะ</div>
        <div style="width:120px;">แพ็กเกจ</div>
        <div style="width:150px;">วันหมดอายุ</div>
        <div style="width:90px;"></div>
      </div>
    </div>

    ${list.map((m) => {
      const i = members.findIndex(x => x.id === m.id);

      return `
        <div class="card" style="padding:12px;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">

<div style="flex:2;min-width:260px;">
  <span class="small">วันที่สมัคร: ${formatCreatedAt(m.CreatedAt)}</span><br>
  <b>${m.FullName || '-'}</b><br>
              <span class="small">เบอร์: ${m.Phone || '-'}</span><br>
              <span class="small">MemberID: ${m.MemberID || '-'}</span><br>
              <span class="small">Display: ${m.DisplayName || '-'}</span><br>
              <span class="small">วันเกิด: ${m.Birthday || '-'}</span>
            </div>

            <select
  id="status-${i}"
  style="
    width:110px;
    background:${getStatusColor(m.Status)};
    color:white;
    font-weight:bold;
  "
  onchange="
    this.style.background=
      this.value==='Active' ? '#2e7d32' :
      this.value==='Pending' ? '#f9a825' :
      this.value==='Expired' ? '#c62828' :
      '#555';
  "
>
              <option value="Pending" ${m.Status === 'Pending' ? 'selected' : ''}>Pending</option>
              <option value="Active" ${m.Status === 'Active' ? 'selected' : ''}>Active</option>
              <option value="Expired" ${m.Status === 'Expired' ? 'selected' : ''}>Expired</option>
            </select>

            <select id="package-${i}" style="width:120px;">
              <option value="">-</option>
              <option value="รายวัน" ${m.Package === 'รายวัน' ? 'selected' : ''}>รายวัน</option>
              <option value="รายเดือน" ${m.Package === 'รายเดือน' ? 'selected' : ''}>รายเดือน</option>
              <option value="ราย6เดือน" ${m.Package === 'ราย6เดือน' ? 'selected' : ''}>ราย6เดือน</option>
              <option value="รายปี" ${m.Package === 'รายปี' ? 'selected' : ''}>รายปี</option>
            </select>

            <input id="expire-${i}" type="date" value="${m.ExpireDate || ''}" style="width:150px;">

            <button onclick="saveMember(${i})" style="width:auto;padding:10px 16px;">
              บันทึก
            </button>

          </div>
        </div>
      `;
    }).join('')}

    <div style="display:flex;gap:8px;justify-content:center;align-items:center;margin-top:16px;flex-wrap:wrap;">
      <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
        ก่อนหน้า
      </button>

      <span class="small">
        หน้า ${currentPage} / ${totalPages || 1}
      </span>

      <button onclick="changePage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>
        ถัดไป
      </button>
    </div>
  `;
}
function changePage(page) {
  currentPage = page;
  renderMembers();
}

function resetPageAndRender() {
  currentPage = 1;
  renderMembers();
}

async function saveMember(i) {
  const m = members[i];

  const status = document.getElementById(`status-${i}`).value;
  const packageName = document.getElementById(`package-${i}`).value;
  const expireDate = document.getElementById(`expire-${i}`).value;

  await updateDoc(doc(db, "members", m.id), {
    Status: status,
    Package: packageName,
    ExpireDate: expireDate
  });

  alert("บันทึกแล้ว");
  loadMembers();
}

loadMembers();
</script>

</body>
</html>
