<!DOCTYPE html>
<html lang="th">   
<head>  
  <meta charset="UTF-8">
  <title>Admin สมาชิกสถานีนักกล้าม</title> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#111; color:#fff; }
    .container {
  padding: 20px;
  max-width: 1150px;
  margin: auto;
}
    .card { background:#1c1c1c; border:1px solid #333; border-radius:16px; padding:16px; margin-bottom:14px; }
    input, select, button { padding:10px; border-radius:8px; border:none; margin:4px 0; }
    button { background:#e53935; color:#fff; font-weight:bold; cursor:pointer; }
    .green { background:#1b5e20; }
    .gray { background:#333; }
    .row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .small { color:#aaa; font-size:13px; }
    .modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.72);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.show {
  display: flex;
}

.modal-box {
  width: 100%;
  max-width: 340px;
  background: #1c1c1c;
  border: 1px solid #333;
  border-radius: 22px;
  padding: 28px 22px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
  animation: modalPop 0.22s ease-out;
}

.modal-icon {
  width: 70px;
  height: 70px;
  margin: 0 auto 16px;
  border-radius: 50%;
  background: #4caf50;
  color: #fff;
  font-size: 42px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-box h2 {
  margin: 0 0 10px;
  color: #fff;
}

.modal-box p {
  margin: 0 0 22px;
  color: #bbb;
  line-height: 1.5;
}

.modal-box button {
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 13px;
  background: #4caf50;
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.modal-box button:hover {
  background: #43a047;
}

@keyframes modalPop {
  from {
    opacity: 0;
    transform: scale(0.88) translateY(15px);
  }

  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}
    .table-row {
  display: grid;
  grid-template-columns:
    minmax(320px, 1fr)
    90px
    150px
    165px
    160px
    120px;
  gap: 10px;
  align-items: center;
}

.table-header {
  padding: 16px;
  background: #222;
  font-weight: bold;
}

.table-header > div:not(:first-child) {
  text-align: center;
}

.member-info {
  min-width: 0;
}

.status-column {
  text-align: center;
  font-weight: bold;
}

.table-row select {
  width: 100%;
  margin: 0;
  box-sizing: border-box;
}

.expire-column {
  text-align: center;
  color: #4caf50;
  font-weight: bold;
}
    .expire-column input {
  width: 100%;
  margin: 0;
  box-sizing: border-box;
}

.save-button {
  width: 90px;
  margin: 0;
  padding: 10px 8px;
}

@media (max-width: 1050px) {
  .table-row {
    grid-template-columns:
      minmax(260px, 1fr)
      80px
      130px
      145px
      135px
      110px;
  }

  .save-button {
    width: 80px;
  }
}
    .card.table-row {
  padding: 12px;
}

.card.table-row.table-header {
  padding: 12px;
}

    .action-column {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.action-column button {
  width: 100%;
  margin: 0;
}

.renew-button {
  background: #1565c0;
  color: #fff;
  padding: 10px 6px;
  font-size: 13px;
}

.renew-button:hover {
  background: #1976d2;
}

.save-button {
  width: 100%;
  margin: 0;
  padding: 10px 8px;
}
    .expire-column input {
  width: 100%;
  margin: 0;
  box-sizing: border-box;
  text-align: center;
  color: #111;
  background: #fff;
}
  </style>
</head>

<body>
<div class="container">
  <h1>🏋️ Admin สมาชิกสถานีนักกล้าม</h1>
  <p class="small">จัดการสมาชิกจาก Firebase</p>

<div style="display:flex;gap:8px;margin-bottom:12px;">
  <input
    id="searchPhone"
    placeholder="ค้นหาชื่อหรือเบอร์โทร"
    oninput="resetPageAndRender()"
    style="flex:1;box-sizing:border-box;"
  >

  <select
    id="searchPackage"
    onchange="resetPageAndRender()"
    style="width:140px;"
  >
    <option value="">ทุกแพ็กเกจ</option>
    <option value="รายวัน">รายวัน</option>
    <option value="รายเดือน">รายเดือน</option>
    <option value="ราย3เดือน">ราย3เดือน</option>
    <option value="ราย6เดือน">ราย6เดือน</option>
    <option value="รายปี">รายปี</option>
    <option value="Special VIP">Special VIP</option>
    <option value="ราย10ครั้ง">ราย10ครั้ง</option>
  </select>
</div>
  <div id="app">กำลังโหลดข้อมูล...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  query,
  orderBy,
  Timestamp
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDI3i71Y6ojdsxN4a60Dli4zcCt2_fmJpc",
  authDomain: "musclestation-3e6ca.firebaseapp.com",
  projectId: "musclestation-3e6ca",
  storageBucket: "musclestation-3e6ca.firebasestorage.app",
  messagingSenderId: "840246501105",
  appId: "1:840246501105:web:8aff7eeb2f3d2186f9d350"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let members = [];
  let currentPage = 1;
const pageSize = 30;
  let statusFilter = '';


window.saveMember = saveMember;
window.loadMembers = loadMembers;
  window.renderMembers = renderMembers;
  window.changePage = changePage;
  window.resetPageAndRender = resetPageAndRender;
  window.filterStatus = filterStatus;
  window.updateExpireDate = updateExpireDate;
  window.useSession = useSession;
  window.renewMember = renewMember;
  function formatLocalDate(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');

  return `${year}-${month}-${day}`;
}

function getTodayText() {
  return formatLocalDate(new Date());
}
  async function updateExpiredMembers() {
  const todayText = getTodayText();

  const membersToExpire = members.filter(m =>
    m.ExpireDate &&
    m.ExpireDate <= todayText &&
    m.Status !== 'Expired'
  );

  await Promise.all(
    membersToExpire.map(m =>
      updateDoc(doc(db, "members", m.id), {
        Status: "Expired"
      })
    )
  );

  membersToExpire.forEach(m => {
    m.Status = "Expired";
  });
}

async function loadMembers() {
  document.getElementById('app').innerHTML =
    '<div class="card">กำลังโหลดข้อมูล...</div>';

  try {
    const q = query(collection(db, "members"), orderBy("CreatedAt", "desc"));
const snap = await getDocs(q);

    members = [];
snap.forEach(docSnap => {
  members.push({
    id: docSnap.id,
    ...docSnap.data()
  });
});

await updateExpiredMembers();

renderMembers();

  } catch (error) {
    console.error(error);
    document.getElementById('app').innerHTML = `
      <div class="card">
        โหลดข้อมูลไม่สำเร็จ<br>
        <span class="small">${error.message}</span>
      </div>
    `;
  }
}

function getStatusColor(status) {
  switch (status) {
    case 'Active':
      return '#2e7d32'; // เขียว

    case 'Pending':
      return '#f9a825'; // เหลือง

    case 'Expired':
      return '#c62828'; // แดง

    default:
      return '#555';
  }
}

  function formatCreatedAt(createdAt) {
  if (!createdAt) return '-';

  const date = createdAt.toDate ? createdAt.toDate() : new Date(createdAt);

  return date.toLocaleString('th-TH', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit'
  });
}
  function formatThaiDate(dateText) {
  if (!dateText) return '-';

  const [year, month, day] = dateText.split('-');

  return `${day}/${month}/${year}`;
}
  

function renderMembers() {
  const keyword = document.getElementById('searchPhone')?.value.trim() || '';
  const packageFilter = document.getElementById('searchPackage')?.value || '';

const filteredList = members.filter(m => {
  const searchText = keyword.toLowerCase();

const searchMatch =
  !searchText ||
  String(m.Phone ?? '').toLowerCase().includes(searchText) ||
  String(m.FullName ?? '').toLowerCase().includes(searchText);

  const packageMatch = packageFilter
    ? m.Package === packageFilter
    : true;

  const statusMatch = statusFilter
    ? getRealStatus(m) === statusFilter
    : true;

  return searchMatch && packageMatch && statusMatch;
});
   

  const totalPages = Math.ceil(filteredList.length / pageSize);

  if (currentPage > totalPages && totalPages > 0) {
    currentPage = 1;
  }

  const start = (currentPage - 1) * pageSize;
  const list = filteredList.slice(start, start + pageSize);

  const activeCount = members.filter(m => getRealStatus(m) === 'Active').length;
  const pendingCount = members.filter(m => getRealStatus(m) === 'Pending').length;
  const expiredCount = members.filter(m => getRealStatus(m) === 'Expired').length;
const tomorrow = new Date();
tomorrow.setDate(tomorrow.getDate() + 1);
const tomorrowText = formatLocalDate(tomorrow);

const expireTomorrowList = members.filter(m =>
  m.ExpireDate === tomorrowText
);

const emptyMessage = list.length === 0
  ? `
    <div class="card" style="text-align:center;color:#aaa;">
      ไม่พบสมาชิกในสถานะนี้
    </div>
  `
  : '';

  document.getElementById('app').innerHTML = `
<div class="card" style="padding:10px;background:#1a1a1a;">
  <div style="display:flex;gap:10px;flex-wrap:wrap;">

    <button
      onclick="filterStatus('')"
      style="
        background:${statusFilter === '' ? '#555' : '#333'};
        color:white;
      "
    >
      👥 ทั้งหมด ${members.length}
    </button>

    <button
      onclick="filterStatus('Active')"
      style="
        background:${statusFilter === 'Active' ? '#2e7d32' : '#333'};
        color:white;
      "
    >
      🟢 Active ${activeCount}
    </button>

    <button
      onclick="filterStatus('Pending')"
      style="
        background:${statusFilter === 'Pending' ? '#f9a825' : '#333'};
        color:white;
      "
    >
      🟡 Pending ${pendingCount}
    </button>

    <button
      onclick="filterStatus('Expired')"
      style="
        background:${statusFilter === 'Expired' ? '#c62828' : '#333'};
        color:white;
      "
    >
      🔴 Expired ${expiredCount}
    </button>

    <div style="margin-left:auto;">
      📄 หน้า ${currentPage}/${totalPages || 1}
    </div>

  </div>
</div>


    ${expireTomorrowList.length > 0 ? `
  <div class="card" style="background:#3a2a00;border-color:#f9a825;">
    ⚠️ สมาชิกที่จะหมดอายุพรุ่งนี้ <b>${expireTomorrowList.length}</b> คน<br>
    <span class="small">
      ${expireTomorrowList.map(m =>
        `${m.FullName || '-'} (${m.Phone || '-'})`
      ).join(' , ')}
    </span>
  </div>
` : ''}

<div class="card table-row table-header">
  <div>ข้อมูลสมาชิก</div>
  <div>สถานะ</div>
  <div>แพ็กเกจ</div>
  <div>โปรโมชั่น</div>
  <div>วันหมดอายุ</div>
  <div></div>
</div>

${list.length === 0 ? emptyMessage : list.map((m) => {
  const i = members.findIndex(x => x.id === m.id);

  return `
<div class="card table-row">

<div class="member-info">
  <span class="small">วันที่สมัคร: ${formatCreatedAt(m.CreatedAt)}</span><br>
  <b>${m.FullName || '-'}</b><br>
              <span class="small">เบอร์: ${m.Phone || '-'}</span><br>
              <span class="small">MemberID: ${m.MemberID || '-'}</span><br>
              <span class="small">Display: ${m.DisplayName || '-'}</span><br>
              <span class="small">วันเกิด: ${m.Birthday || '-'}</span>

${m.Package === 'ราย10ครั้ง' ? `
<br>
<span style="color:#4caf50;font-weight:bold;">
คงเหลือ ${m.Remaining || 0} ครั้ง
</span>
` : ''}
            </div>

<div
  class="status-column"
  style="color:${getStatusColor(getRealStatus(m))};"
>
  ${getRealStatus(m)}
</div>

            <select
  id="package-${i}"
 
  onchange="updateExpireDate(${i})"
>
              <option value="">-</option>
              <option value="รายวัน" ${m.Package === 'รายวัน' ? 'selected' : ''}>รายวัน</option>
              <option value="รายเดือน" ${m.Package === 'รายเดือน' ? 'selected' : ''}>รายเดือน</option>
              <option value="ราย3เดือน" ${m.Package === 'ราย3เดือน' ? 'selected' : ''}>ราย3เดือน</option>
              <option value="ราย6เดือน" ${m.Package === 'ราย6เดือน' ? 'selected' : ''}>ราย6เดือน</option>
              <option value="รายปี" ${m.Package === 'รายปี' ? 'selected' : ''}>รายปี</option>
              <option value="Special VIP" ${m.Package === 'Special VIP' ? 'selected' : ''}>Special VIP</option>
              <option value="ราย10ครั้ง" ${m.Package === 'ราย10ครั้ง' ? 'selected' : ''}>ราย10ครั้ง</option>
            </select>

<select
  id="bonus-${i}"
  onchange="updateExpireDate(${i})"
>
  <option value="0" ${Number(m.BonusDays || 0) === 0 ? 'selected' : ''}>
    ไม่มีวันแถม
  </option>

  <option value="30" ${Number(m.BonusDays || 0) === 30 ? 'selected' : ''}>
    แถม 30 วัน
  </option>

  <option value="60" ${Number(m.BonusDays || 0) === 60 ? 'selected' : ''}>
    แถม 60 วัน
  </option>

  <option value="90" ${Number(m.BonusDays || 0) === 90 ? 'selected' : ''}>
    แถม 90 วัน
  </option>
</select>
            

<div class="expire-column">
  <input
    type="date"
    id="expire-${i}"
    value="${m.ExpireDate || ''}"
  >
</div>
<div class="action-column">

  ${getRealStatus(m) === 'Expired' ? `
    <button
      onclick="renewMember(${i})"
      class="renew-button"
    >
      ต่ออายุสมาชิก
    </button>
  ` : ''}

<div style="display:flex;flex-direction:column;gap:6px;">

  ${m.Package === 'ราย10ครั้ง' &&
    getRealStatus(m) === 'Active'
      ? `
      <button
        onclick="useSession(${i})"
        style="background:#1976d2;"
      >
        ใช้บริการ
      </button>
    `
      : ''}

  <button
    onclick="saveMember(${i})"
    class="save-button"
  >
    บันทึก
  </button>

</div>

</div>

          </div>
  
      `;
    }).join('')}

    <div style="display:flex;gap:8px;justify-content:center;align-items:center;margin-top:16px;flex-wrap:wrap;">
      <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
        ก่อนหน้า
      </button>

      <span class="small">
        หน้า ${currentPage} / ${totalPages || 1}
      </span>

      <button onclick="changePage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>
        ถัดไป
      </button>
    </div>
  `;
}
function changePage(page) {
  currentPage = page;
  renderMembers();
}

function resetPageAndRender() {
  currentPage = 1;
  renderMembers();
}
  function filterStatus(status) {
  statusFilter = status;
  currentPage = 1;
  renderMembers();
}

  function calculateExpireDate(createdAt, packageName, bonusDays = 0) {
  if (!createdAt || !packageName) return '';

  const startDate = createdAt.toDate
    ? createdAt.toDate()
    : new Date(createdAt);

  const expireDate = new Date(startDate);

  switch (packageName) {
    case 'รายวัน':
      expireDate.setDate(expireDate.getDate() + 1);
      break;

    case 'รายเดือน':
      expireDate.setDate(expireDate.getDate() + 30);
      break;

    case 'ราย3เดือน':
      expireDate.setDate(expireDate.getDate() + 90);
      break;

    case 'ราย6เดือน':
      expireDate.setDate(expireDate.getDate() + 180);
      break;

    case 'รายปี':
      expireDate.setFullYear(expireDate.getFullYear() + 1);
      break;
      case 'ราย10ครั้ง':
  return '';

      case 'Special VIP':
  return '';

    default:
      return '';
  }
if (bonusDays > 0) {
  expireDate.setDate(expireDate.getDate() + bonusDays);
}
  return formatLocalDate(expireDate);
}

function updateExpireDate(index) {
  const packageName =
    document.getElementById(`package-${index}`).value;

  const bonusDays = Number(
    document.getElementById(`bonus-${index}`).value || 0
  );

  const member = members[index];

  const expireDate = calculateExpireDate(
    member.CreatedAt,
    packageName,
    bonusDays
  );

  document.getElementById(`expire-${index}`).value =
    expireDate || '';
}
async function renewMember(i) {
  const m = members[i];

  try {
    await updateDoc(doc(db, "members", m.id), {
      CreatedAt: Timestamp.now(),
      Status: "Pending",
      Package: "",
      BonusDays: 0,
      ExpireDate: ""
    });

    await loadMembers();

    showSuccessModal(
      "เริ่มต่ออายุสมาชิกแล้ว กรุณาเลือกแพ็กเกจและกดบันทึก"
    );

  } catch (error) {
    console.error(error);
    alert(`ต่ออายุไม่สำเร็จ: ${error.message}`);
  }
}
async function useSession(i) {
  const m = members[i];

  const today = getTodayText();

  if (m.LastVisitDate === today) {
    alert("สมาชิกใช้สิทธิ์วันนี้แล้ว");
    return;
  }

  const remaining = Number(m.Remaining || 0);

  if (remaining <= 0) {
    alert("จำนวนครั้งคงเหลือหมดแล้ว");
    return;
  }

  const updateData = {
    Remaining: remaining - 1,
    LastVisitDate: today
  };

  if (remaining - 1 <= 0) {
    updateData.Status = "Expired";
  }

  await updateDoc(
    doc(db, "members", m.id),
    updateData
  );

  await loadMembers();

  showSuccessModal("บันทึกการเข้าใช้เรียบร้อย");
}
  
async function saveMember(i) {
  const m = members[i];

  const packageName =
    document.getElementById(`package-${i}`).value;

  const bonusDays = Number(
    document.getElementById(`bonus-${i}`).value || 0
  );

  if (!packageName) {
    alert("กรุณาเลือกแพ็กเกจก่อนบันทึก");
    return;
  }

  const expireDate = calculateExpireDate(
    m.CreatedAt,
    packageName,
    bonusDays
  );

  const manualExpireDate =
    document.getElementById(`expire-${i}`).value;

  const finalExpireDate =
    packageName === 'Special VIP' ||
    packageName === 'ราย10ครั้ง'
      ? ''
      : (manualExpireDate || expireDate);

  if (
    packageName !== 'Special VIP' &&
    packageName !== 'ราย10ครั้ง' &&
    !finalExpireDate
  ) {
    alert("กรุณาเลือกวันหมดอายุ");
    return;
  }

  try {
    const updateData = {
      Status: "Active",
      Package: packageName,
      BonusDays: bonusDays,
      ExpireDate: finalExpireDate
    };

    if (
      packageName === "ราย10ครั้ง" &&
      (!m.Remaining || m.Package !== "ราย10ครั้ง")
    ) {
      updateData.Remaining = 10;
      updateData.LastVisitDate = "";
    }

    await updateDoc(
      doc(db, "members", m.id),
      updateData
    );

    await loadMembers();

    showSuccessModal(
      "บันทึกข้อมูลเรียบร้อย สมาชิกถูกเปลี่ยนเป็น Active"
    );

  } catch (error) {
    console.error(error);
    alert(`บันทึกไม่สำเร็จ: ${error.message}`);
  }
}
function showSuccessModal(message) {
  document.getElementById('successMessage').innerText =
    message || 'ข้อมูลสมาชิกถูกบันทึกแล้ว';

  document.getElementById('successModal').classList.add('show');
}

function closeSuccessModal() {
  document.getElementById('successModal').classList.remove('show');
}

window.closeSuccessModal = closeSuccessModal;
  
function getRealStatus(member) {
  if (
  member.Package === 'ราย10ครั้ง' &&
  Number(member.Remaining || 0) <= 0
) {
  return 'Expired';
}
  const todayText = getTodayText();

  if (
    member.ExpireDate &&
    member.ExpireDate <= todayText
  ) {
    return 'Expired';
  }

  return member.Status || 'Pending';
}

loadMembers();
</script>
