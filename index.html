<!DOCTYPE html>
<html lang="th">
<head>  
  <meta charset="UTF-8">
  <title>สมาชิกสถานีนักกล้าม</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    .container {
      padding: 20px;
      max-width: 480px;
      margin: auto;
    }

    .card {
      background: #1c1c1c;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #333;
    }

    h1, h2, p {
      margin-top: 0;
    }

    label {
      font-size: 14px;
      color: #ccc;
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin: 8px 0 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #e53935;
      color: white;
      font-size: 16px;
      font-weight: bold;
      margin-top: 8px;
    }

    .btn-secondary {
      background: #333;
    }

    .status {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: bold;
    }

    .active {
      background: #1b5e20;
    }

    .pending {
      background: #f9a825;
      color: #111;
    }

    .expired {
      background: #b71c1c;
    }

    .small {
      color: #aaa;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 30px 10px;
    }
  </style>
</head>

<body>
  <div class="container" id="app">
    <div class="card loading">
      <h2>🏋️ กำลังเปิดระบบสมาชิก...</h2>
      <p class="small">กรุณารอสักครู่</p>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const LIFF_ID = '2010600499-3bta2tAd';
const BOOKING_URL = 'https://liff.line.me/2010600499-kGjbynE1';
const LINE_OA_URL = 'https://line.me/R/ti/p/@sathaninakklam';

const firebaseConfig = {
  apiKey: "AIzaSyDI3i71Y6ojdsxN4a60Dli4zcCt2_fmJpc",
  authDomain: "musclestation-3e6ca.firebaseapp.com",
  projectId: "musclestation-3e6ca",
  storageBucket: "musclestation-3e6ca.firebasestorage.app",
  messagingSenderId: "840246501105",
  appId: "1:840246501105:web:8aff7eeb2f3d2186f9d350"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

let profile = null;

window.submitRegister = submitRegister;
window.renewMember = renewMember;
window.bookIceBath = bookIceBath;
window.showBenefits = showBenefits;
window.showProfile = showProfile;
window.contactStaff = contactStaff;
window.closeLiff = closeLiff;

async function main() {
  try {
    showLoading();

    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    profile = await liff.getProfile();

    const memberSnap = await getDoc(doc(db, "members", profile.userId));

    if (memberSnap.exists()) {
      renderDashboard(memberSnap.data());
    } else {
      renderRegisterForm();
    }

  } catch (err) {
    showError(err.message);
  }
}

function showLoading() {
  document.getElementById('app').innerHTML = `
    <div class="card loading">
      <h2>🏋️ กำลังเปิดระบบสมาชิก...</h2>
      <p class="small">กรุณารอสักครู่</p>
    </div>
  `;
}

function showError(message) {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h2>เกิดข้อผิดพลาด</h2>
      <p class="small">${message}</p>
      <button onclick="location.reload()">โหลดใหม่</button>
      <button class="btn-secondary" onclick="contactStaff()">ติดต่อพนักงาน</button>
    </div>
  `;
}

function renderRegisterForm() {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h1>🏋️ สถานีนักกล้าม</h1>
      <h2>สมัครสมาชิกครั้งแรก</h2>
      <p class="small">กรอกข้อมูลเพื่อผูกบัญชี LINE กับสมาชิกของคุณ</p>

      <label>ชื่อ-นามสกุล</label>
      <input id="fullName" placeholder="เช่น สมชาย ใจดี">

      <label>เบอร์โทร</label>
      <input id="phone" type="tel" placeholder="เช่น 0812345678">

      <label>วันเกิด</label>
      <input id="birthday" type="date">

      <label>เพศ</label>
      <select id="gender">
        <option value="">ไม่ระบุ</option>
        <option value="ชาย">ชาย</option>
        <option value="หญิง">หญิง</option>
      </select>

      <button onclick="submitRegister()">สมัครสมาชิก</button>
    </div>
  `;
}

async function submitRegister() {
  const fullName = document.getElementById('fullName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const birthday = document.getElementById('birthday').value;
  const gender = document.getElementById('gender').value;

  if (!fullName || !phone) {
    alert('กรุณากรอกชื่อและเบอร์โทร');
    return;
  }

  try {
    showLoading();

    const memberId = 'MS' + Date.now().toString().slice(-6);

    const member = {
      MemberID: memberId,
      LineUserID: profile.userId,
      DisplayName: profile.displayName,
      FullName: fullName,
      Phone: phone,
      Birthday: birthday,
      Gender: gender,
      Status: 'Pending',
      Package: '',
      ExpireDate: '',
      CreatedAt: serverTimestamp(),
      UpdatedAt: serverTimestamp()
    };

    await setDoc(doc(db, "members", profile.userId), member);

    renderPending({
      ...member,
      CreatedAt: '',
      UpdatedAt: ''
    });

  } catch (err) {
    showError(err.message);
  }
}

function renderDashboard(member) {
  const status = member.Status;

  if (status === 'Pending') {
    renderPending(member);
    return;
  }

  if (status === 'Expired') {
    renderExpired(member);
    return;
  }

  renderActive(member);
}

function renderActive(member) {
  const daysLeft = calculateDaysLeft(member.ExpireDate);

  document.getElementById('app').innerHTML = `
    <div class="card">
      <h1>👋 สวัสดี คุณ${member.FullName || member.DisplayName || ''}</h1>
      <h2>🏋️ สถานีนักกล้าม</h2>

      <p>สถานะสมาชิก</p>
      <span class="status active">Active ✅</span>

      <br><br>

      <p>แพ็กเกจ: <b>${member.Package || '-'}</b></p>
      <p>วันหมดอายุ: <b>${formatDate(member.ExpireDate)}</b></p>
      <p>เหลือ: <b>${daysLeft} วัน</b></p>
    </div>

    <div class="card">
      <button onclick="renewMember()">💳 ต่ออายุสมาชิก</button>
      <button onclick="bookIceBath()">🧊 จอง Ice Bath</button>
      <button onclick="showBenefits()">🎁 สิทธิพิเศษสมาชิก</button>
      <button onclick="showProfile()">👤 ข้อมูลส่วนตัว</button>
      <button class="btn-secondary" onclick="closeLiff()">← กลับ LINE</button>
    </div>
  `;
}

function renderPending(member) {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h1>🏋️ สถานีนักกล้าม</h1>
      <h2>สมัครสมาชิกสำเร็จ ✅</h2>

      <p>รหัสสมาชิก: <b>${member.MemberID || '-'}</b></p>
      <p>สถานะสมาชิก</p>
      <span class="status pending">รอเปิดใช้งาน ⏳</span>

      <br><br>

      <p>
        กรุณาติดต่อพนักงานที่เคาน์เตอร์<br>
        เพื่อชำระเงินและเปิดใช้งานสมาชิก
      </p>

      <button onclick="closeLiff()">← กลับ LINE</button>
    </div>
  `;
}

function renderExpired(member) {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h1>👋 สวัสดี คุณ${member.FullName || member.DisplayName || ''}</h1>
      <h2>สมาชิกหมดอายุ ❌</h2>

      <p>หมดอายุเมื่อ: <b>${formatDate(member.ExpireDate)}</b></p>

      <button onclick="renewMember()">💳 ต่ออายุสมาชิก</button>
      <button onclick="bookIceBath()">🧊 จอง Ice Bath</button>
      <button class="btn-secondary" onclick="closeLiff()">← กลับ LINE</button>
    </div>
  `;
}

function calculateDaysLeft(expireDate) {
  if (!expireDate) return '-';

  const today = new Date();
  const expire = new Date(expireDate);
  const diff = expire - today;

  return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
}

function formatDate(dateText) {
  if (!dateText) return '-';

  const d = new Date(dateText);
  if (isNaN(d)) return dateText;

  return d.toLocaleDateString('th-TH', {
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });
}

function renewMember() {
  alert('กรุณาติดต่อเคาน์เตอร์เพื่อต่ออายุสมาชิก');
}

function bookIceBath() {
  window.location.href = BOOKING_URL;
}

function showBenefits() {
  alert('สิทธิพิเศษสมาชิกจะเพิ่มภายหลัง');
}

function showProfile() {
  alert('ข้อมูลส่วนตัวจะเพิ่มภายหลัง');
}

function contactStaff() {
  liff.openWindow({
    url: LINE_OA_URL,
    external: true
  });
}

function closeLiff() {
  if (liff.isInClient()) {
    liff.closeWindow();
  } else {
    window.close();
  }
}

main();
</script>


  
</body>
</html>
